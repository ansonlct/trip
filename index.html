<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#090A12" />
  <title>優旅程 - Premium Trip</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --bg: #090a12;
      --bg-2: #111322;
      --text: #f7f7fb;
      --muted: rgba(247,247,251,.62);
      --soft: rgba(255,255,255,.10);
      --hairline: rgba(255,255,255,.16);
      --card: rgba(255,255,255,.12);
      --card-2: rgba(255,255,255,.075);
      --accent: #ff375f;
      --accent-2: #7c5cff;
      --blue: #0a84ff;
      --green: #30d158;
      --orange: #ff9f0a;
      --radius-xl: 30px;
      --radius-lg: 23px;
      --radius-md: 17px;
      --shadow: 0 24px 70px rgba(0,0,0,.38);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, "Noto Sans TC", "PingFang HK", "Microsoft JhengHei", sans-serif;
      --ease-spring: cubic-bezier(.2, .9, .18, 1);
    }

    body[data-theme="light"] {
      --bg: #f7f8fd;
      --bg-2: #ffffff;
      --text: #15151d;
      --muted: rgba(22,22,30,.58);
      --soft: rgba(0,0,0,.06);
      --hairline: rgba(0,0,0,.10);
      --card: rgba(255,255,255,.74);
      --card-2: rgba(255,255,255,.58);
      --shadow: 0 22px 58px rgba(48,62,105,.16);
      background:
        radial-gradient(circle at 10% 4%, rgba(255,149,0,.22), transparent 31%),
        radial-gradient(circle at 92% 8%, rgba(10,132,255,.18), transparent 32%),
        radial-gradient(circle at 66% 88%, rgba(255,45,85,.15), transparent 36%),
        linear-gradient(180deg, #fbfcff 0%, #f1f4fb 48%, #ffffff 100%);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    [hidden] { display: none !important; }
    .sheet.mode-event #dayForm { display: none !important; }
    .sheet.mode-day #eventForm { display: none !important; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 18% 8%, rgba(255,55,95,.45), transparent 29%),
        radial-gradient(circle at 88% 4%, rgba(10,132,255,.42), transparent 29%),
        radial-gradient(circle at 70% 88%, rgba(124,92,255,.40), transparent 34%),
        linear-gradient(180deg, #090a12 0%, #111322 48%, #070710 100%);
      overflow: hidden;
      touch-action: pan-x pan-y;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.7), transparent 72%);
    }

    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; }

    .topbar {
      position: fixed;
      z-index: 40;
      inset: 0 0 auto 0;
      padding: calc(12px + var(--safe-top)) 16px 10px;
      background: linear-gradient(180deg, rgba(9,10,18,.88), rgba(9,10,18,.54) 70%, rgba(9,10,18,0));
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }

    .topbar-inner {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .app-title { display: flex; gap: 12px; align-items: center; min-width: 0; }
    .app-icon {
      width: 46px; height: 46px; border-radius: 15px;
      background: linear-gradient(145deg, #ff5a7a, #6b54ff 54%, #00c7ff);
      display: grid; place-items: center;
      box-shadow: 0 12px 30px rgba(255,55,95,.28);
      font-size: 24px;
      flex: 0 0 auto;
    }
    .app-title h1 {
      margin: 0;
      font-size: clamp(18px, 5vw, 25px);
      letter-spacing: -.5px;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .app-title p { margin: 5px 0 0; color: var(--muted); font-size: 12px; font-weight: 650; }
    .trip-name-line {
      color: rgba(255,255,255,.82) !important;
      font-weight: 850 !important;
      max-width: 430px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .share-id-mini {
      display: inline-flex;
      align-items: center;
      margin-left: 6px;
      padding: 3px 8px;
      border-radius: 999px;
      color: #d7ffe3;
      background: rgba(48,209,88,.16);
      border: 1px solid rgba(48,209,88,.24);
      font-size: 10px;
      font-weight: 950;
      letter-spacing: .2px;
      vertical-align: 1px;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .share-id-mini:active { transform: scale(.98); }
    .trip-name-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      max-width: 100%;
      margin-bottom: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      color: rgba(255,255,255,.88);
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.12);
      font-size: 12px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .trip-name-pill .share-mini {
      color: #d7ffe3;
      background: rgba(48,209,88,.16);
      border: 1px solid rgba(48,209,88,.22);
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 10px;
      font-weight: 950;
      letter-spacing: .2px;
      cursor: pointer;
    }
    .trip-name-pill .share-mini:active { transform: scale(.98); }

    .toolbar { display: flex; gap: 8px; align-items: center; justify-self: end; }
    .pill-btn {
      color: var(--text);
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      min-height: 38px;
      padding: 0 13px;
      font-weight: 800;
      box-shadow: inset 0 1px rgba(255,255,255,.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .pill-btn.primary { background: linear-gradient(135deg, #ff375f, #7c5cff); border-color: transparent; }
    .pill-btn.warn { background: rgba(255,159,10,.14); color: #ffd69a; }
    .pill-btn:active { transform: scale(.98); }

    .status-line {
      max-width: 860px;
      margin: 10px auto 0;
      color: rgba(255,255,255,.58);
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 0 4px;
    }
    .edit-badge {
      display: none;
      color: #ffd1dc;
      font-weight: 800;
    }
    body.editing .edit-badge { display: inline; }

    .pager {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100dvh;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .pager::-webkit-scrollbar { display: none; }

    .day-page {
      flex: 0 0 100vw;
      height: 100dvh;
      overflow-y: auto;
      scroll-snap-align: start;
      padding: calc(116px + var(--safe-top)) 16px calc(116px + var(--safe-bottom));
      -webkit-overflow-scrolling: touch;
    }
    .day-wrap { max-width: 860px; margin: 0 auto; }

    .hero {
      position: relative;
      overflow: hidden;
      min-height: 188px;
      padding: 22px;
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.20), rgba(255,255,255,.07)),
        radial-gradient(circle at 92% 18%, rgba(255,255,255,.22), transparent 28%);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: var(--shadow);
      backdrop-filter: blur(30px) saturate(1.25);
      -webkit-backdrop-filter: blur(30px) saturate(1.25);
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: -60% -30% auto auto;
      width: 230px; height: 230px;
      border-radius: 80px;
      background: linear-gradient(135deg, rgba(255,55,95,.85), rgba(10,132,255,.42));
      transform: rotate(32deg);
      filter: blur(.2px);
      opacity: .95;
    }
    .hero::after {
      content: "✈︎";
      position: absolute;
      right: 18px; top: 20px;
      font-size: 86px;
      color: rgba(255,255,255,.18);
      transform: rotate(-12deg);
    }
    .hero-content { position: relative; z-index: 1; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 7px;
      color: rgba(255,255,255,.76);
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .2px;
    }
    .hero h2 {
      margin: 18px 0 5px;
      font-size: clamp(42px, 15vw, 78px);
      line-height: .88;
      letter-spacing: -3px;
    }
    .hero .date { color: rgba(255,255,255,.72); font-size: 15px; font-weight: 750; }
    .stats { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 19px; }
    .stat {
      border-radius: 999px;
      padding: 8px 11px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.82);
      font-size: 12px;
      font-weight: 760;
    }
    button.stat { cursor: pointer; }
    button.stat:active { transform: scale(.97); }
    button.stat.active {
      color: white;
      border-color: transparent;
      background: linear-gradient(135deg, rgba(255,55,95,.92), rgba(124,92,255,.92));
      box-shadow: 0 12px 26px rgba(124,92,255,.22);
    }
    .filter-banner {
      margin: 14px 0 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 11px;
      color: rgba(255,255,255,.86);
      background: rgba(255,159,10,.14);
      border: 1px solid rgba(255,159,10,.24);
      font-size: 12px;
      font-weight: 850;
    }
    .filter-clear {
      color: white;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 900;
    }
    .hero-actions { display: flex; flex-wrap: wrap; margin-top: 16px; gap: 8px; }

    .timeline {
      position: relative;
      margin-top: 24px;
      padding-left: 18px;
    }
    .timeline::before {
      content: "";
      position: absolute;
      top: 6px; bottom: 22px; left: 7px;
      width: 3px;
      border-radius: 999px;
      background: linear-gradient(to bottom, rgba(255,55,95,.9), rgba(124,92,255,.7), rgba(255,255,255,.08));
    }

    .event-card {
      position: relative;
      margin: 0 0 16px;
      padding: 17px 17px 16px;
      border-radius: 25px;
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.08));
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 14px 44px rgba(0,0,0,.24);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      transition: transform .22s ease, background .22s ease, border-color .22s ease;
    }
    .event-card::before {
      content: "";
      position: absolute;
      left: -17px; top: 23px;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(255,55,95,.12), 0 0 0 1px rgba(255,255,255,.35);
    }
    body.editing .event-card { border-color: rgba(255,255,255,.26); }
    body.editing .event-card:active { transform: scale(.995); }

    .card-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .card-top-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
      max-width: 56%;
      flex: 0 1 56%;
    }
    .icon-edit-btn {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, rgba(255,55,95,.92), rgba(124,92,255,.92));
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 10px 24px rgba(124,92,255,.22), inset 0 1px rgba(255,255,255,.18);
      font-size: 17px;
      line-height: 1;
    }
    .icon-edit-btn:active { transform: scale(.96); }

    .icon-star-btn {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,.76);
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: inset 0 1px rgba(255,255,255,.12);
      font-size: 17px;
      line-height: 1;
    }
    .icon-star-btn.active {
      color: #3a2500;
      background: linear-gradient(135deg, #ffe17a, #ffb300);
      border-color: rgba(255,222,89,.82);
      box-shadow: 0 12px 28px rgba(255,179,0,.28), inset 0 1px rgba(255,255,255,.55);
    }
    .icon-star-btn:active { transform: scale(.96); }
    .event-card.is-starred {
      background:
        linear-gradient(180deg, rgba(255,210,72,.30), rgba(255,179,0,.16)),
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
      border-color: rgba(255,211,77,.68);
      box-shadow: 0 20px 58px rgba(255,179,0,.18), 0 14px 44px rgba(0,0,0,.24);
    }
    .event-card.is-starred::before {
      background: #ffd43b;
      box-shadow: 0 0 0 7px rgba(255,212,59,.18), 0 0 24px rgba(255,193,7,.60);
    }
    .event-card.is-starred .event-title::before {
      content: "⭐ ";
      filter: drop-shadow(0 2px 6px rgba(255,193,7,.35));
    }
    .time {
      display: inline-flex; align-items: center; gap: 6px;
      color: #ffd1dc;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: .1px;
    }
    .tag {
      flex: 0 0 auto;
      display: inline-flex; align-items: center; gap: 5px;
      max-width: 100%;
      min-width: 0;
      color: rgba(255,255,255,.78);
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 790;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .event-title {
      margin: 12px 0 8px;
      font-size: 20px;
      line-height: 1.22;
      letter-spacing: -.35px;
      color: #fff;
      font-weight: 920;
    }
    .event-title.empty { color: rgba(255,255,255,.42); font-style: italic; }
    .desc {
      margin: 0;
      color: rgba(255,255,255,.72);
      font-size: 14.5px;
      line-height: 1.52;
      white-space: normal;
    }
    .hotel {
      margin-top: 13px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(10,132,255,.14);
      border: 1px solid rgba(10,132,255,.22);
      color: #cae4ff;
      font-weight: 760;
      font-size: 13px;
      line-height: 1.43;
    }
    .memo {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      color: #fff5ce;
      background: rgba(255,204,0,.12);
      border: 1px solid rgba(255,204,0,.18);
      border-radius: 15px;
      font-size: 13px;
      line-height: 1.45;
    }
    .memo:not(:empty) { display: block; }

    .card-actions {
      display: none;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 14px;
      border-top: 1px solid rgba(255,255,255,.10);
      padding-top: 12px;
    }
    body.editing .card-actions { display: flex; }
    .mini-btn {
      color: rgba(255,255,255,.88);
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 850;
    }
    .mini-btn.danger { color: #ffd3d3; background: rgba(255,59,48,.13); }
    .mini-btn.good { color: #d7ffe3; background: rgba(48,209,88,.14); }

    .desc a, .hotel a, .memo a {
      color: #bfe0ff;
      font-weight: 850;
      text-decoration: underline;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 3px;
      word-break: break-all;
    }
    .voucher-box {
      margin-top: 13px;
      padding: 13px;
      border-radius: 19px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.15);
      display: grid;
      gap: 10px;
    }
    .voucher-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      color: rgba(255,255,255,.82);
      font-size: 12px;
      font-weight: 900;
    }
    .voucher-type {
      border-radius: 999px;
      padding: 4px 8px;
      color: #3a2500;
      background: linear-gradient(135deg, #ffe17a, #ffb300);
      font-size: 10px;
      letter-spacing: .2px;
    }
    .code-render {
      min-height: 132px;
      display: grid;
      place-items: center;
      padding: 10px;
      border-radius: 16px;
      background: #fff;
      overflow-x: auto;
    }
    .code-render img, .code-render canvas {
      max-width: 100%;
      height: auto;
      image-rendering: pixelated;
    }
    .code-render svg {
      max-width: 100%;
      height: auto;
      display: block;
    }
    .code-render.fallback-only {
      min-height: auto;
      color: #111;
      font-weight: 900;
      word-break: break-all;
      text-align: center;
    }
    .voucher-raw {
      color: rgba(255,255,255,.72);
      font-size: 12px;
      line-height: 1.35;
      word-break: break-all;
    }
    .share-id-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin: 10px 0 4px;
      padding: 6px 9px;
      border-radius: 999px;
      color: #d7ffe3;
      background: rgba(48,209,88,.13);
      border: 1px solid rgba(48,209,88,.25);
      font-size: 11px;
      font-weight: 920;
      letter-spacing: .3px;
    }
    .code-grid { display: grid; grid-template-columns: 1.4fr .8fr; gap: 12px; }
    .star-form-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,.80);
      font-size: 13px;
      font-weight: 850;
      padding: 11px 12px;
      border-radius: 17px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
    }
    .star-form-row input { width: 20px; height: 20px; accent-color: #ffb300; padding: 0; }

    .empty-day {
      padding: 24px;
      border-radius: 24px;
      text-align: center;
      color: rgba(255,255,255,.62);
      background: rgba(255,255,255,.08);
      border: 1px dashed rgba(255,255,255,.20);
    }

    .onboarding {
      margin-top: 18px;
      padding: 22px;
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(255,255,255,.15), rgba(255,255,255,.07));
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: var(--shadow);
      text-align: left;
    }
    .onboarding h3 { margin: 0 0 8px; font-size: 22px; letter-spacing: -.3px; }
    .onboarding p { margin: 0; color: rgba(255,255,255,.68); line-height: 1.55; font-size: 14px; }
    .onboarding-steps { display: grid; gap: 9px; margin: 16px 0; }
    .onboarding-step {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 17px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.11);
      color: rgba(255,255,255,.82);
      font-weight: 820;
      font-size: 13px;
    }
    .onboarding-step b {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff375f, #7c5cff);
      color: white;
      flex: 0 0 auto;
      font-size: 12px;
    }
    .onboarding-actions { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 14px; }
    .onboarding-actions .pill-btn { min-height: 42px; }


    .day-rail {
      position: fixed;
      z-index: 45;
      left: 0; right: 0; bottom: 0;
      padding: 10px 12px calc(10px + var(--safe-bottom));
      background: linear-gradient(180deg, rgba(9,10,18,0), rgba(9,10,18,.72) 28%, rgba(9,10,18,.92));
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }
    .rail-scroll {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      gap: 9px;
      overflow-x: auto;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      padding: 4px 2px;
    }
    .rail-scroll::-webkit-scrollbar { display: none; }
    .day-tab {
      flex: 0 0 auto;
      width: 72px;
      min-height: 56px;

    function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
    function storageGet(key) {
      try { return window.localStorage ? localStorage.getItem(key) : null; }
      catch (error) { console.warn("localStorage read unavailable", error); return null; }
    }
    function storageSet(key, value) {
      try { if (window.localStorage) localStorage.setItem(key, value); return true; }
      catch (error) { console.warn("localStorage write unavailable", error); return false; }
    }
    function storageRemove(key) {
      try { if (window.localStorage) localStorage.removeItem(key); return true; }
      catch (error) { console.warn("localStorage remove unavailable", error); return false; }
    }
    function loadTrip() {
      try {
        const raw = storageGet(STORAGE_KEY);
        if (!raw) return normalizeTripData(deepClone(STARTER_DATA));
        const parsed = JSON.parse(raw);
        const savedTrip = Array.isArray(parsed) ? parsed : (parsed && Array.isArray(parsed.trip) ? parsed.trip : null);
        if (!savedTrip) throw new Error("Invalid saved trip");
        if (parsed && parsed.tripName) applyAppTitle(parsed.tripName, { persist: true });
        else if (parsed && parsed.appTitle && parsed.appTitle !== DEFAULT_APP_TITLE && parsed.appTitle !== "中部北陸・Premium Trip") applyAppTitle(parsed.appTitle, { persist: true });
        if (parsed && parsed.share && parsed.share.enabled) storageSet(SHARE_KEY, JSON.stringify(parsed.share));
        return normalizeTripData(savedTrip);
      } catch (error) {
        console.warn(error);
        return normalizeTripData(deepClone(STARTER_DATA));
      }
    }

    function loadAppTitle() {
      const saved = storageGet(APP_TITLE_KEY);
      if (!saved || saved === DEFAULT_APP_TITLE || saved === "中部北陸・Premium Trip") return DEFAULT_TRIP_NAME;
      return String(saved).trim() || DEFAULT_TRIP_NAME;
    }

    function applyAppTitle(title = loadAppTitle(), options = {}) {
      const clean = String(title || "").trim() || DEFAULT_TRIP_NAME;
      const appTitleEl = $("#appTitleText");
      if (appTitleEl) appTitleEl.textContent = DEFAULT_APP_TITLE;
      const tripNameEl = $("#tripNameText");
      if (tripNameEl) tripNameEl.textContent = clean;
      document.title = DEFAULT_APP_TITLE;
      if (options.persist !== false) storageSet(APP_TITLE_KEY, clean);
      updateShareDisplay();
      return clean;
    }

    function loadShareSettings() {
      try {
        const raw = storageGet(SHARE_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        if (!parsed || !parsed.enabled) return { enabled: false };
        return {
          enabled: true,
          tripShareId: parsed.tripShareId || "",
          password: parsed.password || "",
          enabledAt: parsed.enabledAt || "",
          updatedAt: parsed.updatedAt || ""
        };
      } catch (error) {
        console.warn("Share settings read failed", error);
        return { enabled: false };
      }
    }

    function isShareEnabled() {
      return !!loadShareSettings().enabled;
    }

    function isValidSharePassword(value = "") {
      return /^[A-Za-z0-9]{8,}$/.test(String(value || ""));
    }

    function randomAlphaNum(length = 10) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      const out = [];
      if (window.crypto && crypto.getRandomValues) {
        const bytes = new Uint32Array(length);
        crypto.getRandomValues(bytes);
        for (let i = 0; i < length; i++) out.push(chars[bytes[i] % chars.length]);
      } else {
        for (let i = 0; i < length; i++) out.push(chars[Math.floor(Math.random() * chars.length)]);
      }
      return out.join("");
    }

    function collectShareIds() {
      const ids = new Set();
      const settings = loadShareSettings();
      if (settings.tripShareId) ids.add(settings.tripShareId);
      return ids;
    }

    function uniqueShareId(ids = collectShareIds()) {
      let id = randomAlphaNum(10);
      while (ids.has(id)) id = randomAlphaNum(10);
      ids.add(id);
      return id;
    }

    async function copyTextToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return true;
      }
      const temp = document.createElement("textarea");
      temp.value = text;
      temp.setAttribute("readonly", "");
      temp.style.position = "fixed";
      temp.style.left = "-9999px";
      document.body.appendChild(temp);
      temp.select();
      let ok = false;
      try { ok = document.execCommand("copy"); } catch (error) { ok = false; }
      temp.remove();
      return ok;
    }

      if (meta) meta.setAttribute("content", themeColor);
      const btn = $("#themeBtn");
      if (btn) btn.textContent = safeTheme === "light" ? "☀️" : "🌙";
      if (btn) btn.setAttribute("aria-label", safeTheme === "light" ? "切換到暗黑模式" : "切換到日光模式");
    }

    function extractISOFromDayDate(value = "") {
      const text = String(value || "").trim();
      let m = text.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
      if (m) return `${m[1]}-${padTimePart(m[2])}-${padTimePart(m[3])}`;
      m = text.match(/(\d{1,2})月(\d{1,2})日/);
      if (m) return `${TRIP_YEAR}-${padTimePart(m[1])}-${padTimePart(m[2])}`;
      return "";
    }

    function formatDateLabel(iso = "") {
      const clean = extractISOFromDayDate(iso);
      if (!clean) return "";
      const [year, month, day] = clean.split("-").map(Number);
      const date = new Date(year, month - 1, day);
      if (Number.isNaN(date.getTime())) return "";
      return `${clean} (${WEEKDAY_ZH[date.getDay()]})`;
    }

    function normalizeDayDate(value = "") {
      return formatDateLabel(value) || String(value || "").trim();
    }

    function normalizeTripData(data) {
      return (Array.isArray(data) ? data : []).map((day, index) => ({
        id: day.id || `day-${index + 1}`,
        day: day.day || `Day ${index + 1}`,
        date: normalizeDayDate(day.date || ""),
        events: Array.isArray(day.events) ? day.events : []
      }));
    }

    function parseDayDate(day) {
      const iso = extractISOFromDayDate(day && day.date);
      if (!iso) return null;
      const [year, month, date] = iso.split("-").map(Number);
      return new Date(year, month - 1, date, 0, 0, 0, 0);
    }

    function sameCalendarDate(a, b) {
      return a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    function parseTimeRange(value = "") {
      const found = [...String(value).matchAll(/(\d{1,2}):(\d{2})/g)].map(m => Number(m[1]) * 60 + Number(m[2]));
      if (!found.length) return { start: null, end: null };
      const start = found[0];
      let end = found[1];
      if (end === undefined) end = /後|以後|after/i.test(value) ? 23 * 60 + 59 : Math.min(start + 45, 23 * 60 + 59);
      if (end < start) end += 24 * 60;
      return { start, end };
    }

    function padTimePart(value) { return String(value).padStart(2, "0"); }

    function minutesToTime(value) {
      if (value === null || value === undefined || Number.isNaN(value)) return "";
      const minutes = ((value % (24 * 60)) + (24 * 60)) % (24 * 60);
      return `${padTimePart(Math.floor(minutes / 60))}:${padTimePart(minutes % 60)}`;
    }

    const TIME_STEP_MINUTES = 5;
    const TIME_MINUTE_VALUES = Array.from({ length: 12 }, (_, i) => i * TIME_STEP_MINUTES);

    function buildHourOptionsHTML() {
      let html = '<option value="">時</option>';
      for (let h = 0; h < 24; h += 1) {
        const value = padTimePart(h);
        html += `<option value="${value}">${value}</option>`;
      }
      return html;
    }

    function buildMinuteOptionsHTML() {
      let html = '<option value="">分</option>';
      for (const m of TIME_MINUTE_VALUES) {
        const value = padTimePart(m);
        html += `<option value="${value}">${value}</option>`;
      }
      return html;
    }

    function setupTimeSelects() {
      const hourHTML = buildHourOptionsHTML();
      const minuteHTML = buildMinuteOptionsHTML();
      [$("#fStartHour"), $("#fEndHour")].forEach((select) => {
        if (select && !select.dataset.ready) {
          select.innerHTML = hourHTML;
          select.dataset.ready = "1";
        }
      });
      [$("#fStartMinute"), $("#fEndMinute")].forEach((select) => {
        if (select && !select.dataset.ready) {
          select.innerHTML = minuteHTML;
          select.dataset.ready = "1";
        }
      });
    }

    function snapTimeToStep(value = "") {
      const match = String(value || "").match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return "";
      let h = Math.max(0, Math.min(23, Number(match[1])));
      let m = Math.max(0, Math.min(59, Number(match[2])));
      let total = h * 60 + m;
      total = Math.round(total / TIME_STEP_MINUTES) * TIME_STEP_MINUTES;
      total = Math.max(0, Math.min((23 * 60) + 55, total));
      return minutesToTime(total);
    }

    function setTimePickerValue(kind, value = "") {
      const prefix = kind === "end" ? "fEnd" : "fStart";
      const hourEl = $(`#${prefix}Hour`);
      const minuteEl = $(`#${prefix}Minute`);
      if (!hourEl || !minuteEl) return;
      const snapped = snapTimeToStep(value);
      if (!snapped) {
        hourEl.value = "";
        minuteEl.value = "";
        return;
      }
      const [hour, minute] = snapped.split(":");
      hourEl.value = hour;
      minuteEl.value = minute;
    }

    function getTimePickerValue(kind) {
      const prefix = kind === "end" ? "fEnd" : "fStart";
      const hour = $(`#${prefix}Hour`) ? $(`#${prefix}Hour`).value : "";
      let minute = $(`#${prefix}Minute`) ? $(`#${prefix}Minute`).value : "";
      if (!hour) return "";
      if (!minute) minute = "00";
      return `${hour}:${minute}`;
    }

    function setTimeSelectValue(selector, value = "") {
      // 舊函數名保留作兼容：#fStartTime / #fEndTime 會映射到新的小時 + 分鐘選擇器。
      setTimePickerValue(String(selector || "").toLowerCase().includes("end") ? "end" : "start", value);
    }

    function extractTimeFields(value = "") {
      const found = [...String(value).matchAll(/(\d{1,2}):(\d{2})/g)].map(m => `${padTimePart(m[1])}:${m[2]}`);
      return {
        start: found[0] || "",
        end: found[1] || "",
        suffix: /後|以後|after/i.test(value) ? "後" : ""
      };
    }

    function composeTimeRange(start, end, suffix = "") {
      const cleanStart = String(start || "").trim();
      const cleanEnd = String(end || "").trim();
      if (cleanStart && cleanEnd) return `${cleanStart} - ${cleanEnd}`;
      if (cleanStart && suffix) return `${cleanStart}${suffix}`;
      if (cleanStart) return cleanStart;
      if (cleanEnd) return cleanEnd;
      return "";
    }

    function formatDuration(minutes) {
      if (!Number.isFinite(minutes) || minutes <= 0) return "";
      const hrs = Math.floor(minutes / 60);
      const mins = minutes % 60;
      const parts = [];
      if (hrs) parts.push(`${hrs} 小時`);
      if (mins) parts.push(`${mins} 分鐘`);
      return parts.join(" ");
    }

    function eventTimeParts(value = "") {
      const text = String(value || "").trim();
      if (!text) return { label: "未設定時間", duration: "" };
      const fields = extractTimeFields(text);
      if (fields.start && fields.end) {
        const range = parseTimeRange(`${fields.start} - ${fields.end}`);
        return {
          label: `${fields.start} - ${fields.end}`,
          duration: formatDuration(range.end - range.start)
        };
      }
      if (fields.start) return { label: `${fields.start}${fields.suffix}`, duration: "" };
      return { label: text, duration: "" };
    }

    function renderDayOptions(selectedIndex = activeDay) {
      const select = $("#fDayTarget");
      if (!select) return;
      select.innerHTML = trip.map((day, index) => `
        <option value="${index}" ${index === selectedIndex ? "selected" : ""}>${escapeHTML(day.day || `Day ${index + 1}`)}・${escapeHTML(day.date || "未設定日期")}</option>`).join("");
    }

    function sortEventsByTime(events = []) {
      events.sort((a, b) => {
        const at = parseTimeRange(a.time).start;
        const bt = parseTimeRange(b.time).start;
        if (at === null && bt === null) return 0;
        if (at === null) return 1;
        if (bt === null) return -1;
        return at - bt;
      });
    }

    function locateTripMoment(now = new Date()) {
      if (!trip.length) return null;
      const dated = trip.map((day, index) => ({ day, index, date: parseDayDate(day) })).filter(item => item.date);
      if (!dated.length) return { dayIndex: 0, eventIndex: 0, state: "next" };
      const today = dated.find(item => sameCalendarDate(item.date, now));
      if (!today) {
        const first = dated[0];
        const last = dated[dated.length - 1];
        if (now < first.date) return { dayIndex: first.index, eventIndex: 0, state: "next", outside: "before" };
        const lastEnd = new Date(last.date); lastEnd.setHours(23, 59, 59, 999);
        if (now > lastEnd) return { dayIndex: last.index, eventIndex: Math.max(0, trip[last.index].events.length - 1), state: "past", outside: "after" };
        const next = dated.find(item => item.date > now) || last;
        return { dayIndex: next.index, eventIndex: 0, state: "next" };
      }
      const events = today.day.events || [];
      if (!events.length) return { dayIndex: today.index, eventIndex: null, state: "today" };
      const nowMin = now.getHours() * 60 + now.getMinutes();
      const ranges = events.map((event, eventIndex) => ({ eventIndex, ...parseTimeRange(event.time) })).filter(r => r.start !== null);
      const current = ranges.find(r => nowMin >= r.start && nowMin <= r.end);
      if (current) return { dayIndex: today.index, eventIndex: current.eventIndex, state: "now" };
      const next = ranges.find(r => r.start >= nowMin);
      if (next) return { dayIndex: today.index, eventIndex: next.eventIndex, state: "next" };
      return { dayIndex: today.index, eventIndex: ranges.length ? ranges[ranges.length - 1].eventIndex : events.length - 1, state: "past" };
    }

    function refreshMomentFocus() {
      momentFocus = locateTripMoment();
      return momentFocus;
    }

    function momentClass(dayIndex, eventIndex) {
      if (!momentFocus || momentFocus.dayIndex !== dayIndex || momentFocus.eventIndex !== eventIndex) return "";
      if (momentFocus.state === "now") return " is-now";
      if (momentFocus.state === "next") return " is-next";
      return "";
    }

    function momentChip(dayIndex, eventIndex) {
      if (!momentFocus || momentFocus.dayIndex !== dayIndex || momentFocus.eventIndex !== eventIndex) return "";
      if (momentFocus.state === "now") return '<span class="live-chip">LIVE</span>';
      if (momentFocus.state === "next") return '<span class="live-chip next">NEXT</span>';
      return "";
    }

    function getPage(dayIndex = activeDay) { return $(`.day-page[data-day="${dayIndex}"]`); }
    function getPageScrollTop(dayIndex = activeDay) { const page = getPage(dayIndex); return page ? page.scrollTop : 0; }
    function restorePageScroll(dayIndex, top) {
      requestAnimationFrame(() => {
        const page = getPage(dayIndex);
        if (page) page.scrollTo({ top, behavior: "auto" });
      });
    }

    function renderKeepingScroll(dayIndex = activeDay, top = getPageScrollTop(dayIndex)) {
      render();
      goToDay(dayIndex, false, false);
      restorePageScroll(dayIndex, top);
    }

    function scrollToEvent(dayIndex, eventIndex, behavior = "smooth") {
      const page = getPage(dayIndex);
      if (!page || eventIndex === null || eventIndex === undefined) return;
      const card = page.querySelector(`.event-card[data-event="${eventIndex}"]`);
      if (!card) return;
      const pageRect = page.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();
      const top = page.scrollTop + cardRect.top - pageRect.top - 16;
      page.scrollTo({ top: Math.max(0, top), behavior });
      card.classList.remove("focus-pulse");
      void card.offsetWidth;
      card.classList.add("focus-pulse");
      setTimeout(() => card.classList.remove("focus-pulse"), 1000);
    }

    function jumpToNow(smooth = true) {
      const focus = refreshMomentFocus();
      render();
      if (!focus) return goToDay(0, smooth);
      const behavior = smooth ? "smooth" : "auto";
      goToDay(focus.dayIndex, smooth);
      requestAnimationFrame(() => setTimeout(() => scrollToEvent(focus.dayIndex, focus.eventIndex, behavior), smooth ? 180 : 0));
      const stateText = focus.state === "now" ? "目前行程" : focus.state === "next" ? "下一個行程" : focus.outside === "before" ? "旅程第一天" : focus.outside === "after" ? "旅程最後一天" : "今日行程";
      showToast(`已定位到${stateText}`);
    }
    function persist(show = true) {

        appTitle: DEFAULT_APP_TITLE,
        tripName: loadAppTitle(),
        trip,
        ...(share.enabled ? { share } : {})
      };
      storageSet(STORAGE_KEY, JSON.stringify(state));
      const now = new Date();
      saveStatus.textContent = "已儲存：" + now.toLocaleTimeString("zh-HK", { hour: "2-digit", minute: "2-digit" });
      updateShareButton();
      scheduleFirebaseSync();
      if (show) showToast(isShareEnabled() ? "已儲存並準備同步" : "已儲存到此裝置");

    function escapeHTML(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
    function linkifyText(value = "") {
      const escaped = escapeHTML(value);
      return escaped.replace(/((?:https?:\/\/|www\.)[^\s<]+)/gi, (match) => {
        let clean = match;
        let tail = "";
        while (/[.,，。!?！？)）\]]$/.test(clean)) {
          tail = clean.slice(-1) + tail;
          clean = clean.slice(0, -1);
        }
        const href = /^www\./i.test(clean) ? `https://${clean}` : clean;
        return `<a class="auto-link" href="${href}" target="_blank" rel="noopener noreferrer">${clean}</a>${tail}`;
      });
    }
    function lines(value = "") { return linkifyText(value).replace(/\n/g, "<br>"); }
    function compactDate(date = "") {
      const iso = extractISOFromDayDate(date);
      if (iso) return iso.slice(5);
      const m = String(date || "").match(/(\d+月\d+日)/);
      return m ? m[1] : String(date || "").replace(/\s*-\s*Day\s*\d+/i, "").slice(0, 10);
    }
    function tagIcon(tag = "") {
      const t = tag.toLowerCase();
      if (/早餐|午餐|晚餐|餐|咖啡|壽司|鰻|燒肉|豬排/.test(tag)) return "🍽️";
      if (/駕|車|自駕|租車|還車/.test(tag)) return "🚗";
      if (/鐵|地鐵|交通|乘|站/.test(tag)) return "🚆";
      if (/購|商|店|藥妝|百貨/.test(tag)) return "🛍️";
      if (/觀光|步行|城|園|街|展望|纜車/.test(tag)) return "📍";
      if (/休息|酒店|飯店|住宿/.test(tag)) return "🛏️";
      if (/手續|機場|登機|退房|入住/.test(tag)) return "🧾";
      return "✨";
    }
    function eventSearchText(event = {}) {
      return [event.tag, event.title, event.desc, event.hotel, event.memo].map(v => String(v || "")).join(" ");
    }
    function isFoodEvent(event = {}) {
      return /早餐|午餐|晚餐|餐|咖啡|茶|甜品|壽司|燒肉|鰻|豬排|拉麵|咖哩|海鮮|牛|飯|市場/.test(eventSearchText(event));
    }
    function isTransportEvent(event = {}) {
      return /駕|車|自駕|租車|還車|鐵|地鐵|交通|乘|站|機場|登機|抵達|出發|港|巴士|的士|taxi|airport|station/i.test(eventSearchText(event));
    }
    function dayStats(day) {
      const events = Array.isArray(day && day.events) ? day.events : [];
      return {

        food: events.filter(isFoodEvent).length,
        move: events.filter(isTransportEvent).length

    function filterLabel(filter = activeFilter) {

    function filterEventsWithIndex(events = [], filter = activeFilter) {
      return events.map((event, eventIndex) => ({ event, eventIndex })).filter(({ event }) => {

    function renderCodeFallback(box, value, type) {
      box.classList.add("fallback-only");
      box.textContent = type === "barcode" ? `條碼文字：${value}` : `QR 文字：${value}`;
    }

    function renderCodes(root = document) {
      $$(".code-render", root).forEach((box) => {
        const value = String(box.dataset.codeText || "").trim();
        const type = box.dataset.codeType === "barcode" ? "barcode" : "qr";
        if (!value) return;
        box.innerHTML = "";
        box.classList.remove("fallback-only");
        try {
          if (type === "barcode") {
            if (!window.JsBarcode) return renderCodeFallback(box, value, type);
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            box.appendChild(svg);
            JsBarcode(svg, value, { format: "CODE128", displayValue: true, height: 58, margin: 8, fontSize: 14 });
          } else {
            if (!window.QRCode) return renderCodeFallback(box, value, type);
            new QRCode(box, { text: value, width: 136, height: 136, colorDark: "#111111", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.M });
          }
        } catch (error) {
          console.warn("Code render failed", error);
          renderCodeFallback(box, value, type);
        }
      });
    }

    let iosModalResolver = null;

    function closeIosModal(value = null) {
      if (!iosModalBackdrop || iosModalBackdrop.hidden) return;
      iosModalBackdrop.hidden = true;
      iosModalBackdrop.setAttribute("aria-hidden", "true");
      iosModalBody.replaceChildren();
      iosModalActions.replaceChildren();
      const resolver = iosModalResolver;
      iosModalResolver = null;
      if (resolver) resolver(value);
    }

    function openIosModal({ title = "提示", message = "", body = null, actions = [], onOpen = null } = {}) {
      return new Promise((resolve) => {
        iosModalResolver = resolve;
        iosModalTitle.textContent = title;
        iosModalMessage.textContent = message || "";
        iosModalMessage.style.display = message ? "block" : "none";
        iosModalBody.replaceChildren();
        if (body) iosModalBody.appendChild(body);
        iosModalBody.style.display = body ? "grid" : "none";
        iosModalActions.replaceChildren();
        const finalActions = actions.length ? actions : [{ label: "知道了", value: true, primary: true }];
        iosModalActions.className = "ios-modal-actions " + (finalActions.length > 2 ? "stack" : "multi");
        finalActions.forEach((action) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "ios-modal-btn" + (action.primary ? " primary" : "") + (action.danger ? " danger" : "") + (action.cancel ? " cancel" : "");
          btn.textContent = action.label;
          btn.addEventListener("click", () => closeIosModal(action.value));
          iosModalActions.appendChild(btn);
        });
        iosModalBackdrop.hidden = false;
        iosModalBackdrop.setAttribute("aria-hidden", "false");
        setTimeout(() => {
          if (typeof onOpen === "function") onOpen();
          else {
            const primary = iosModalActions.querySelector(".primary") || iosModalActions.querySelector("button");
            if (primary) primary.focus({ preventScroll: true });
          }
        }, 30);
      });
    }

      if (!options.multiline) input.type = options.inputType || "text";
      input.value = defaultValue || "";
      input.placeholder = options.placeholder || "";
      if (options.readonly) input.readOnly = true;
      return openIosModal({
        title,
        message: options.message || "",
        body: input,
        actions: [
          { label: options.cancelText || "取消", value: null, cancel: true },
          { label: options.confirmText || "確定", value: "__ok__", primary: true }
        ],
        onOpen: () => { input.focus({ preventScroll: true }); if (!options.readonly) input.select(); }
      }).then((result) => result === "__ok__" ? input.value : null);

    function saveEventFromForm(event) {
      event.preventDefault();
      if (!trip.length) { closeSheet(); return openDayEditor(null); }
      const sourceDay = editorState.dayIndex;
      const targetDay = Math.max(0, Math.min(Number($("#fDayTarget").value || sourceDay), trip.length - 1));
      const existing = editorState.eventIndex === null ? null : trip[sourceDay].events[editorState.eventIndex];
      const payload = {
        id: existing ? existing.id : `custom-${Date.now()}`,
        time: composeTimeRange(getTimePickerValue("start"), getTimePickerValue("end"), $("#fStartHour").dataset.suffix || ""),
        title: $("#fTitle").value.trim(),

      };
      const keepTop = getPageScrollTop(targetDay);
      if (editorState.eventIndex === null) {
        trip[targetDay].events.push(payload);

        trip[sourceDay].events[editorState.eventIndex] = payload;
      } else {

    async function handleAction(action, dayIndex, eventIndex, filterValue = "") {
      if (action === "share-info") return openShareDetails();
      if (action === "edit-title") return editAppTitle();
      if (action === "new-day-empty") return openDayEditor(null);
      if (action === "filter") {
        activeFilter = ["all", "food", "move"].includes(filterValue) ? filterValue : "all";
        const targetDay = Number.isFinite(dayIndex) ? dayIndex : activeDay;
        activeDay = targetDay;
        renderKeepingScroll(targetDay, getPageScrollTop(targetDay));
        return showToast(activeFilter === "all" ? "已顯示全部行程" : `已篩選：${filterLabel(activeFilter)}`);
      }
      if (!trip[dayIndex]) return openDayEditor(null);
      const events = trip[dayIndex].events;
      const keepTop = getPageScrollTop(dayIndex);
      if (action === "add") return openEventEditor(dayIndex, null);
      if (action === "edit-day") return openDayEditor(dayIndex);
      if (action === "delete-day") {
        const dayName = trip[dayIndex].day || `Day ${dayIndex + 1}`;
        const ok = await showIosConfirm(`確定刪除「${dayName}」？這天內的所有行程也會被刪除。`, { title: "刪除日子", confirmText: "刪除", danger: true });
        if (!ok) return;
        trip.splice(dayIndex, 1);
        activeDay = trip.length ? Math.max(0, Math.min(activeDay, trip.length - 1)) : 0;
        refreshMomentFocus();
        render();
        goToDay(activeDay, false);
        persist(false);
        return showToast("日子已刪除");
      }
      if (action === "star") {
        events[eventIndex].starred = !events[eventIndex].starred;
        refreshMomentFocus();
        renderKeepingScroll(dayIndex, keepTop);
        persist(false);
        return showToast(events[eventIndex].starred ? "已標記為期待 / 關注" : "已取消期待 / 關注標記");
      }
      if (action === "edit") return openEventEditor(dayIndex, eventIndex);
      if (action === "move") return openEventEditor(dayIndex, eventIndex);
      if (action === "duplicate") {
        const copy = deepClone(events[eventIndex]);
        copy.id = `copy-${Date.now()}`;
        delete copy.shareId;
        copy.title = copy.title ? copy.title + "（複製）" : "新行程";
        events.splice(eventIndex + 1, 0, copy);
      }
      if (action === "delete") {
        const ok = await showIosConfirm("確定刪除此行程？", { title: "刪除行程", confirmText: "刪除", danger: true });
        if (!ok) return;
        events.splice(eventIndex, 1);
      }
      refreshMomentFocus();
      renderKeepingScroll(dayIndex, keepTop);
      persist(false);
      showToast("變更已儲存");
    }

    async function sha256Text(text) {
      const data = new TextEncoder().encode(String(text || ""));
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function saveTripToFirebase(options = {}) {

        const payload = firebaseTripPayload(share, passwordHash);
        payload.updatedAt = api.serverTimestamp();
        await api.setDoc(api.doc(api.db, "trips", share.tripShareId), payload, { merge: true });
        firebaseLastSavedKey = stateKey;
        removeEventShareIds();
        if (!firebaseRemoteApplying) {
          const now = new Date();
          saveStatus.textContent = "已同步 Firebase：" + now.toLocaleTimeString("zh-HK", { hour: "2-digit", minute: "2-digit" });
        }
        await startFirebaseLiveSync();
        if (!silent) {
          await showIosAlert(`已開始同步到 Firebase。

分享 ID：${share.tripShareId}
密碼：${share.password}

其他人可用「加入他人行程」輸入此 ID + 密碼。之後所有修改會自動同步，不需要再按上載。`, "Firebase 同步已開啟");
        }
      } catch (error) {
        console.error(error);
        if (!silent) await showIosAlert("Firebase 同步失敗：" + (error && error.message ? error.message : error), "同步失敗");
        else showToast("Firebase 同步失敗");
      }
    }

    async function startFirebaseLiveSync() {
      const share = loadShareSettings();
      if (!share.enabled || !share.tripShareId || !share.password) return;
      if (firebaseUnsubscribe && firebaseListeningTripId === share.tripShareId) return;
      stopFirebaseLiveSync();
      try {
        const api = await getFirebaseApi();
        firebaseListeningTripId = share.tripShareId;
        firebaseUnsubscribe = api.onSnapshot(api.doc(api.db, "trips", share.tripShareId), async (snap) => {
          if (!snap.exists()) return;
          const data = snap.data();
          if (!data || !Array.isArray(data.trip)) return;
          if (data.clientId && data.clientId === getClientId()) return;
          const localShare = loadShareSettings();
          if (!localShare.enabled || localShare.tripShareId !== share.tripShareId) return;
          if (data.share && data.share.passwordHash) {
            const localHash = await sha256Text(localShare.password || "");
            if (localHash !== data.share.passwordHash) return;
          }
          firebaseRemoteApplying = true;
          try {
            trip = normalizeTripData(data.trip);
            applyAppTitle(data.tripName || DEFAULT_TRIP_NAME, { persist: true });
            activeDay = trip.length ? Math.max(0, Math.min(activeDay, trip.length - 1)) : 0;
            activeFilter = "all";
            refreshMomentFocus();
            persist(false);
            render();
            saveStatus.textContent = "已接收 Firebase 同步：" + new Date().toLocaleTimeString("zh-HK", { hour: "2-digit", minute: "2-digit" });
          } finally {
            firebaseRemoteApplying = false;
          }
        }, (error) => {
          console.error(error);
          showToast("Firebase 即時同步中斷");
        });
      } catch (error) {
        console.error(error);
        showToast("未能開啟 Firebase 即時同步");
      }
    }

    async function loadTripFromFirebase() {
      closeSettingsMenu();
      const tripShareId = await showIosPrompt("加入他人行程", loadShareSettings().tripShareId || "", {
        message: "請輸入對方提供的 10 位專屬 ID。加入後會自動同步，大家可一齊查看及修改同一個旅程。",
        placeholder: "10 位英數字專屬 ID"
      });
      if (tripShareId === null) return;
      const cleanId = String(tripShareId || "").trim();
      if (!/^[A-Za-z0-9]{10}$/.test(cleanId)) return showIosAlert("專屬 ID 應為 10 位英數字。", "專屬 ID 格式錯誤");
      const password = await showIosPrompt("輸入分享密碼", "", { inputType: "password" });
      if (password === null) return;
      if (!isValidSharePassword(password)) return showIosAlert("密碼格式不正確：必須為 8 位或以上英數字。", "密碼格式錯誤");

      try {
        const api = await getFirebaseApi();
        const snap = await api.getDoc(api.doc(api.db, "trips", cleanId));
        if (!snap.exists()) return showIosAlert("找不到此旅程 ID。請確認 ID 是否正確，或請對方先開啟「分享個人行程」。", "找不到旅程");
        const data = snap.data();
        const passwordHash = await sha256Text(password);
        const savedHash = data && data.share && data.share.passwordHash;
        if (savedHash && savedHash !== passwordHash) return showIosAlert("密碼不正確。", "加入失敗");
        if (!data || !Array.isArray(data.trip)) return showIosAlert("Firebase 內的旅程資料格式不正確。", "資料格式錯誤");

        stopFirebaseLiveSync();
        firebaseRemoteApplying = true;
        try {
          trip = normalizeTripData(data.trip);
          applyAppTitle(data.tripName || DEFAULT_TRIP_NAME, { persist: true });
          storageSet(SHARE_KEY, JSON.stringify({
            enabled: true,
            tripShareId: cleanId,
            password,
            enabledAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          }));
          removeEventShareIds();
          activeDay = 0;
          activeFilter = "all";
          refreshMomentFocus();
          updateShareButton();
          persist(false);
          render();
          if (trip.length) jumpToNow(false); else goToDay(0, false);
        } finally {
          firebaseRemoteApplying = false;
        }
        await startFirebaseLiveSync();
        await showIosAlert("已加入他人行程，並開始 Firebase 即時同步。之後你或其他人的修改會自動更新。", "加入完成");
      } catch (error) {
        console.error(error);
        await showIosAlert("加入他人行程失敗：" + (error && error.message ? error.message : error), "加入失敗");
      }
    }

    const settingsBtn = $("#settingsBtn");
    const settingsMenu = $("#settingsMenu");
    function closeSettingsMenu() { if (settingsMenu) settingsMenu.hidden = true; }
    if (settingsBtn && settingsMenu) {
      settingsBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        settingsMenu.hidden = !settingsMenu.hidden;
      });
      settingsMenu.addEventListener("click", (event) => event.stopPropagation());
      document.addEventListener("click", closeSettingsMenu);
    }

    const headerShareChip = $("#headerShareChip");
    if (headerShareChip) headerShareChip.addEventListener("click", openShareDetails);

    setupTimeSelects();
    setSheetMode("event");
    closeSheet();

    $("#newDayBtn").addEventListener("click", () => { closeSettingsMenu(); openDayEditor(null); });
    $("#editTitleBtn").addEventListener("click", editAppTitle);
    $("#shareSetupBtn").addEventListener("click", openShareSetup);
    const manualFirebaseSaveBtn = $("#firebaseSaveBtn");
    if (manualFirebaseSaveBtn) manualFirebaseSaveBtn.addEventListener("click", () => saveTripToFirebase({ silent: false, force: true }));
    $("#firebaseLoadBtn").addEventListener("click", loadTripFromFirebase);
    $("#fab").addEventListener("click", () => openEventEditor(activeDay, null));
    $("#closeSheet").addEventListener("click", closeSheet);
    $("#cancelEvent").addEventListener("click", closeSheet);
    $("#cancelDay").addEventListener("click", closeSheet);
    $("#eventForm").addEventListener("submit", saveEventFromForm);
    $("#dayForm").addEventListener("submit", saveDayFromForm);
    sheetBackdrop.addEventListener("click", (event) => { if (event.target === sheetBackdrop) closeSheet(); });
    window.addEventListener("load", () => renderCodes(pager));

    if (isShareEnabled()) {
      startFirebaseLiveSync();
    }



    $("#initBtn").addEventListener("click", async () => {
      closeSettingsMenu();
      const ok = await showIosConfirm("確定初始化？所有已建立日子、行程、備忘、兌換碼及本機紀錄都會刪除。此操作不能復原。", { title: "初始化", confirmText: "初始化", danger: true });
      if (!ok) return;
      stopFirebaseLiveSync();
      trip = [];
      activeDay = 0;
      activeFilter = "all";
      storageRemove(STORAGE_KEY);
      storageRemove(APP_TITLE_KEY);
      storageRemove(SHARE_KEY);
      removeEventShareIds();
      applyAppTitle(DEFAULT_TRIP_NAME);
      refreshMomentFocus();
      render();
      goToDay(0, false);
      persist(false);
      showToast("已初始化並刪除所有紀錄");
    });

    $("#exportBtn").addEventListener("click", () => {
      closeSettingsMenu();
      const share = loadShareSettings();
      const backup = { appTitle: DEFAULT_APP_TITLE, tripName: loadAppTitle(), trip, ...(share.enabled ? { share } : {}) };
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      const safeTitle = loadAppTitle().replace(/[^A-Za-z0-9一-鿿_-]+/g, "_").replace(/^_+|_+$/g, "") || "Premium_Trip";
      a.download = `${safeTitle}_Backup.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast("已匯出 JSON 備份");
    });

    $("#importBtn").addEventListener("click", () => { closeSettingsMenu(); $("#importFile").click(); });
    $("#importFile").addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        const importedTrip = Array.isArray(parsed) ? parsed : parsed && Array.isArray(parsed.trip) ? parsed.trip : null;
        if (!importedTrip) throw new Error("格式不正確");
        trip = normalizeTripData(importedTrip);
        if (parsed && parsed.tripName) applyAppTitle(parsed.tripName, { persist: true });
        else if (parsed && parsed.appTitle && parsed.appTitle !== DEFAULT_APP_TITLE && parsed.appTitle !== "中部北陸・Premium Trip") applyAppTitle(parsed.appTitle, { persist: true });
        if (parsed && parsed.share && parsed.share.enabled) {
          storageSet(SHARE_KEY, JSON.stringify(parsed.share));
          ensureEventShareIds();
        } else {
          storageRemove(SHARE_KEY);
          removeEventShareIds();
        }
        activeDay = 0;
        activeFilter = "all";
        refreshMomentFocus();
        persist(false);
        render();
        if (trip.length) jumpToNow(false); else goToDay(0, false);
        showToast("已匯入備份並儲存");
      } catch (error) {
        await showIosAlert("匯入失敗：" + error.message, "匯入失敗");
      } finally {
        event.target.value = "";
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && iosModalBackdrop && !iosModalBackdrop.hidden) { closeIosModal(null); return; }
      if (event.key === "Escape") closeSheet();
      if (event.key === "ArrowLeft") goToDay(activeDay - 1);
      if (event.key === "ArrowRight") goToDay(activeDay + 1);
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "s") {
        event.preventDefault();
        persist(true);
      }
    });

    window.addEventListener("beforeunload", () => persist(false));

    applyAppTitle();
    removeEventShareIds();
    applyTheme(preferredTheme());
    updateShareButton();
    refreshMomentFocus();
    render();
    jumpToNow(false);

    setInterval(() => {
      if (sheetBackdrop.classList.contains("open")) return;
      const before = JSON.stringify(momentFocus);
      refreshMomentFocus();
      if (JSON.stringify(momentFocus) !== before) renderKeepingScroll(activeDay);
    }, 60000);
  </script>
</body>
</html>
